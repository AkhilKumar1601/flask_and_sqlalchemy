<h1>Task Master</h1>

<form action="/" method="POST">

    <input type="text" name="content">

    <input type="submit" value="Add Task">

</form>

{% if tasks|length < 1 %}
<h3>No task created yet, kindly create this. </h3>
{% else %}
<table border="1">

    <tr>
        <th>Task</th>
        <th>Date Created</th>
        <th>Actions</th>
    </tr>

    {% for task in tasks %}

    <tr>

        <td>{{ task.content }}</td>

        <td>{{ task.date_created.date() }}</td>

        <td>
            <a href="/delete/{{ task.id }}"> Delete </a>
            </br>
            <a href="/update/{{ task.id }}"> Update </a>
        </td>

    </tr>

    {% endfor %}

</table>
{% endif %}
